{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sre-demo-app
  labels:
    app.kubernetes.io/name: sre-demo-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sre-demo-app
  policyTypes:
    - Ingress
  # Restricts inbound traffic to the application port; namespace-level policy can be tightened further later.
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end }}