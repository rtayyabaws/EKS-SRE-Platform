apiVersion: v1
kind: Service
metadata:
  name: sre-demo-app
  labels:
    app.kubernetes.io/name: sre-demo-app
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: sre-demo-app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP