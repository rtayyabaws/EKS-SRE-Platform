apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-demo-app
  labels:
    app.kubernetes.io/name: sre-demo-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sre-demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sre-demo-app
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: sre-demo-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          # Health probes allow Kubernetes to restart unhealthy pods and only route traffic when ready.
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          # Requests and limits improve scheduling reliability and protect the node from noisy-neighbour behaviour.
          resources:
{{ toYaml .Values.resources | indent 12 }}