apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-demo-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/LeN0UR/eks-sre-platform.git
    targetRevision: main
    path: helm/sre-demo-app

  destination:
    server: https://kubernetes.default.svc
    namespace: sre-demo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true