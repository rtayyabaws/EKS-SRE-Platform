apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: crashloop-container
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Application is starting"
              sleep 3600
