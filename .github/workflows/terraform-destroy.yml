name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Copy tfvars for CI
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name eks-sre-platform || echo "Cluster not found, skipping kubectl setup"

      - name: Delete ingress-nginx service to release NLB
        run: |
          if kubectl cluster-info &>/dev/null 2>&1; then
            echo "Deleting ingress-nginx controller service..."
            kubectl delete svc ingress-nginx-controller \
              -n ingress-nginx \
              --ignore-not-found=true
            echo "Waiting 90s for NLB to fully deprovision..."
            sleep 90
          else
            echo "Cluster not reachable, skipping NLB cleanup"
          fi

      - name: Empty ECR repository
        run: |
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name sre-demo-app \
            --region ${{ env.AWS_REGION }} \
            --query 'imageIds[*]' \
            --output json)
          if [ "$IMAGE_IDS" != "[]" ]; then
            echo "Deleting images from ECR..."
            aws ecr batch-delete-image \
              --repository-name sre-demo-app \
              --region ${{ env.AWS_REGION }} \
              --image-ids "$IMAGE_IDS"
          else
            echo "ECR repository already empty"
          fi

      - name: Terraform destroy
        run: |
          terraform destroy -auto-approve \
            -target=module.eks \
            -target=module.vpc \
            -target=module.ecr \
            -target=aws_eks_pod_identity_association.external_dns
        timeout-minutes: 45